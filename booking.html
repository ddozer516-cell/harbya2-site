<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Goal Zone Football Field Booking Website">
<title>Booking</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<section class="booking-page">
<div class="booking-form">
<a href="index.html" class="btn">Back Home</a>
<h2>Football Field Booking</h2>
<form action="#">
<input type="text" placeholder="Enter Your Name" required minlength="3">
<input type="tel" placeholder="Enter Your Phone" required pattern="[0-9]{11}">
<select required>
<option value="">Select Football Field</option>
<option>5x5 Field</option>
<option>7x7 Field</option>
<option>VIP Stadium</option>
</select>
<input type="date" required>
<input type="time" required>
<button type="submit">Confirm Booking</button>
</form>
</div>
</section>
</body>
</html>
